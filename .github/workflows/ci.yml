name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check (authored modules)
        # Scope to actively-maintained code; the legacy scaffold (api/admin,
        # api/billing, telegram_bot/handlers) carries pre-existing lint debt.
        run: ruff check api/access_control.py api/analytics.py api/main.py tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install project
        run: pip install -e ".[dev]" || pip install -e .
      - name: Install test deps
        run: pip install pytest
      - name: Run tests
        run: pytest
