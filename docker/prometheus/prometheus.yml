# Aigenis Parser — Prometheus Configuration
# Collects metrics from the Telegram bot and the API service.

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'aigenis'

# Alertmanager (optional — configure when alerting rules are added)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

rule_files:
  # - "alerts.yml"

scrape_configs:
  # Telegram Bot metrics
  - job_name: 'aigenis-bot'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['bot:9090']
        labels:
          service: 'bot'
          environment: 'production'

  # REST API metrics (via standard /metrics endpoint)
  - job_name: 'aigenis-api'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'api'
          environment: 'production'

  # Node exporter for host-level metrics (optional)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
