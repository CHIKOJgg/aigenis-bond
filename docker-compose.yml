# =============================================================================
# Aigenis Parser v2 — Docker Compose (Production)
# =============================================================================
# Быстрый старт (HTTP, без HTTPS):
#   docker compose up -d                        # всё: postgres + redis + parser + API + bot
#   docker compose up -d frontend               # + frontend (nginx)
#
# HTTPS (требует домена и настроенного DNS):
#   docker compose --profile certbot run --rm certbot certonly \
#     --email admin@example.com -d your-domain.com
#   docker compose up -d
#
# Однократные команды:
#   docker compose run --rm parser once         # сбор данных
#   docker compose run --rm parser health       # health-check
#   docker compose run --rm parser desk-curve   # кривая доходности
#
# Генерация секретов:
#   python scripts/generate_secrets.py --write-env
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL 16
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: aigenis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aigenis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Run: python scripts/generate_secrets.py --write-env}
      POSTGRES_DB: ${POSTGRES_DB:-aigenis}
    # Expose port only for host access; internal networking uses 5432
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aigenis} -d ${POSTGRES_DB:-aigenis}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - aigenis-net
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEM_LIMIT:-512M}
        reservations:
          memory: ${POSTGRES_MEM_RESERVE:-256M}

  # --------------------------------------------------------------------------
  # Redis 7
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: aigenis-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy ${REDIS_MAXMEM_POLICY:-allkeys-lru}
    # ports only needed for host access; internal networking uses 6379
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aigenis-net
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT:-256M}
        reservations:
          memory: ${REDIS_MEM_RESERVE:-128M}

  # --------------------------------------------------------------------------
  # Parser (основной сервис — сбор данных, планировщик, аналитика)
  # --------------------------------------------------------------------------
  parser:
    build:
      context: .
      dockerfile: Dockerfile
    image: aigenis-parser:latest
    container_name: aigenis-parser
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # --- Scraper ---
      AIGENIS_BASE_URL: ${AIGENIS_BASE_URL:-https://aigenis.by}
      AIGENIS_DATA_API_URL: ${AIGENIS_DATA_API_URL:-}
      AIGENIS_HEADLESS: ${AIGENIS_HEADLESS:-true}
      AIGENIS_USE_STEALTH: ${AIGENIS_USE_STEALTH:-true}
      AIGENIS_DELAY_BETWEEN_REQUESTS: ${AIGENIS_DELAY_BETWEEN_REQUESTS:-2.0}
      AIGENISGENIS_MAX_CONCURRENCY: ${AIGENIS_MAX_CONCURRENCY:-2}
      AIGENIS_MAX_RETRIES: ${AIGENIS_MAX_RETRIES:-3}
      AIGENIS_TIMEOUT: ${AIGENIS_TIMEOUT:-30}
      AIGENIS_HISTORY_BACKFILL_DAYS: ${AIGENIS_HISTORY_BACKFILL_DAYS:-1825}
      AIGENIS_CURRENCIES: ${AIGENIS_CURRENCIES:-USD,BYN,EUR,XAU,XAG,XPT}
      # --- API Auth (invest.aigenis.by) ---
      AIGENIS_WEB_URL: ${AIGENIS_WEB_URL:-}
      AIGENIS_WEB_USERNAME: ${AIGENIS_WEB_USERNAME:-}
      AIGENIS_WEB_PASSWORD: ${AIGENIS_WEB_PASSWORD:-}
      # --- Logging ---
      AIGENIS_LOG_LEVEL: ${AIGENIS_LOG_LEVEL:-INFO}
      AIGENIS_LOG_JSON: ${AIGENIS_LOG_JSON:-true}
      AIGENIS_LOG_FILE: /app/logs/scraper.log
      AIGENIS_LOG_ROTATION: ${AIGENIS_LOG_ROTATION:-100 MB}
      AIGENIS_LOG_RETENTION: ${AIGENIS_LOG_RETENTION:-14 days}
      # --- Sentry ---
      SENTRY_DSN: ${SENTRY_DSN:-}
      AIGENIS_ENVIRONMENT: ${AIGENIS_ENVIRONMENT:-production}
      # --- Database ---
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aigenis:aigenis@postgres:5432/aigenis}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql://aigenis:aigenis@postgres:5432/aigenis}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_POOL_OVERFLOW: ${DB_POOL_OVERFLOW:-20}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30.0}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-3600}
      DB_SLOW_QUERY_THRESHOLD_S: ${DB_SLOW_QUERY_THRESHOLD_S:-0.1}
      # --- Redis ---
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_MAX_CONNECTIONS: ${REDIS_MAX_CONNECTIONS:-20}
      # --- Telegram ---
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALERT_CHAT_ID: ${TELEGRAM_ALERT_CHAT_ID:-}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
      # --- Auth & Billing (for background tasks) ---
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      # YooKassa (ЮKassa) — СНГ-платежи
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      YOOKASSA_PRO_PRICE: ${YOOKASSA_PRO_PRICE:-29.00}
      YOOKASSA_ENTERPRISE_PRICE: ${YOOKASSA_ENTERPRISE_PRICE:-99.00}
      YOOKASSA_CURRENCY: ${YOOKASSA_CURRENCY:-BYN}
    volumes:
      - logs:/app/logs
    networks:
      - aigenis-net
    deploy:
      resources:
        limits:
          memory: ${PARSER_MEM_LIMIT:-2G}
        reservations:
          memory: ${PARSER_MEM_RESERVE:-1G}

  # --------------------------------------------------------------------------
  # Telegram-бот (профиль: bot)
  # --------------------------------------------------------------------------
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: aigenis-parser:latest
    container_name: aigenis-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aigenis:aigenis@postgres:5432/aigenis}
      AIGENIS_HEADLESS: "true"
      AIGENIS_USE_STEALTH: "false"
      AIGENIS_WEB_URL: ${AIGENIS_WEB_URL:-}
      AIGENIS_WEB_USERNAME: ${AIGENIS_WEB_USERNAME:-}
      AIGENIS_WEB_PASSWORD: ${AIGENIS_WEB_PASSWORD:-}
      AIGENIS_LOG_LEVEL: ${AIGENIS_LOG_LEVEL:-INFO}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-/webhook}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-8080}
      # --- Auth & Billing (for bot handlers) ---
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      # YooKassa (ЮKassa) — СНГ-платежи
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      YOOKASSA_PRO_PRICE: ${YOOKASSA_PRO_PRICE:-29.00}
      YOOKASSA_ENTERPRISE_PRICE: ${YOOKASSA_ENTERPRISE_PRICE:-99.00}
      YOOKASSA_CURRENCY: ${YOOKASSA_CURRENCY:-BYN}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@aigenis.by}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@aigenis.by}
    volumes:
      - logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'telegram_bot.bot' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - aigenis-net
    command: ["python", "-m", "telegram_bot.bot"]
    deploy:
      resources:
        limits:
          memory: ${BOT_MEM_LIMIT:-512M}
        reservations:
          memory: ${BOT_MEM_RESERVE:-256M}

  # --------------------------------------------------------------------------
  # REST API (всегда)
  # --------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: aigenis-parser:latest
    container_name: aigenis-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # ports:
    #   - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aigenis:aigenis@postgres:5432/aigenis}
      AIGENIS_LOG_LEVEL: ${AIGENIS_LOG_LEVEL:-INFO}
      # --- Auth & Billing ---
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # YooKassa (ЮKassa) — СНГ-платежи
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      YOOKASSA_PRO_PRICE: ${YOOKASSA_PRO_PRICE:-29.00}
      YOOKASSA_ENTERPRISE_PRICE: ${YOOKASSA_ENTERPRISE_PRICE:-99.00}
      YOOKASSA_CURRENCY: ${YOOKASSA_CURRENCY:-BYN}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@aigenis.by}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@aigenis.by}
      # --- Frontend ---
      FRONTEND_DIR: /app/frontend/dist
    volumes:
      - logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - aigenis-net
    command:
      - python
      - -m
      - uvicorn
      - api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "2"
      - --log-level
      - info
    deploy:
      resources:
        limits:
          memory: ${API_MEM_LIMIT:-512M}
        reservations:
          memory: ${API_MEM_RESERVE:-256M}

  # --------------------------------------------------------------------------
  # Certbot — Let's Encrypt SSL certificate management
  # --------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: aigenis-certbot
    profiles: ["certbot"]
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"

  # --------------------------------------------------------------------------
  # Frontend (nginx) — React SPA + API proxy + SSL termination
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: aigenis-frontend:latest
    container_name: aigenis-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      # dist/ builds inside the container — do NOT mount host dist/ over it
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    networks:
      - aigenis-net
    deploy:
      resources:
        limits:
          memory: ${FRONTEND_MEM_LIMIT:-128M}
        reservations:
          memory: ${FRONTEND_MEM_RESERVE:-64M}

  # --------------------------------------------------------------------------
  # Prometheus — metrics collection
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: aigenis-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - aigenis-net
    deploy:
      resources:
        limits:
          memory: ${PROMETHEUS_MEM_LIMIT:-512M}
        reservations:
          memory: ${PROMETHEUS_MEM_RESERVE:-256M}

  # --------------------------------------------------------------------------
  # Grafana — dashboards and visualization
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: aigenis-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - aigenis-net
    deploy:
      resources:
        limits:
          memory: ${GRAFANA_MEM_LIMIT:-256M}
        reservations:
          memory: ${GRAFANA_MEM_RESERVE:-128M}

# --------------------------------------------------------------------------
# Сети
# --------------------------------------------------------------------------
networks:
  aigenis-net:
    name: aigenis-net
    driver: bridge

# --------------------------------------------------------------------------
# Тома
# --------------------------------------------------------------------------
volumes:
  pgdata:
    name: aigenis-pgdata
  redisdata:
    name: aigenis-redisdata
  logs:
    name: aigenis-logs
  certbot-www:
    name: aigenis-certbot-www
  certbot-conf:
    name: aigenis-certbot-conf
  prometheus-data:
    name: aigenis-prometheus-data
  grafana-data:
    name: aigenis-grafana-data
