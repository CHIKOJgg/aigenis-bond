<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Logo icon -->
  <g transform="translate(100, 80)">
    <rect width="60" height="60" rx="14" fill="rgba(16,185,129,0.2)"/>
    <path d="M15 40 L25 20 L35 30 L45 10" stroke="#34d399" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="45" cy="10" r="4" fill="#34d399"/>
  </g>
  <text x="180" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="white">Aigenis Bonds</text>
  <!-- Main headline -->
  <text x="100" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="bold" fill="white">
    <tspan>AI-скоринг</tspan>
    <tspan x="100" dy="65" fill="url(#accent)">облигаций</tspan>
  </text>
  <!-- Subtitle -->
  <text x="100" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#9ca3af">
    <tspan>Найдите лучшие облигации за секунды.</tspan>
    <tspan x="100" dy="36">100+ облигаций · 6 валют · ML-прогнозы</tspan>
  </text>
  <!-- Stats badges -->
  <g transform="translate(100, 500)">
    <rect width="140" height="50" rx="12" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
    <text x="70" y="30" font-family="system-ui, sans-serif" font-size="13" fill="#34d399" text-anchor="middle">100+ bonds</text>
  </g>
  <g transform="translate(260, 500)">
    <rect width="140" height="50" rx="12" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
    <text x="70" y="30" font-family="system-ui, sans-serif" font-size="13" fill="#34d399" text-anchor="middle">6 currencies</text>
  </g>
  <g transform="translate(420, 500)">
    <rect width="140" height="50" rx="12" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
    <text x="70" y="30" font-family="system-ui, sans-serif" font-size="13" fill="#34d399" text-anchor="middle">ML predictions</text>
  </g>
  <g transform="translate(580, 500)">
    <rect width="140" height="50" rx="12" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
    <text x="70" y="30" font-family="system-ui, sans-serif" font-size="13" fill="#34d399" text-anchor="middle">24/7 alerts</text>
  </g>
  <!-- Decorative line -->
  <line x1="100" y1="470" x2="720" y2="470" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- URL -->
  <text x="1100" y="600" font-family="system-ui, sans-serif" font-size="16" fill="#4b5563" text-anchor="end">aigenis.by</text>
</svg>
