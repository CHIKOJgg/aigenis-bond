<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aigenis Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <nav class="border-b border-gray-800 bg-gray-900 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <a href="/admin" class="text-lg font-bold text-emerald-400">Aigenis Admin</a>
      <a href="/admin/users" class="text-sm text-gray-400 hover:text-white">Users</a>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-sm text-gray-400">{{ admin.name }}</span>
      <span class="text-xs bg-emerald-900 text-emerald-300 px-2 py-0.5 rounded">{{ admin.subscription_tier }}</span>
      <a href="/admin/login" class="text-sm text-red-400 hover:text-red-300">Logout</a>
    </div>
  </nav>
  <main class="max-w-7xl mx-auto p-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
