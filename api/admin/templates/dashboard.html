{% extends "base.html" %}
{% block content %}
<div class="space-y-6">
  <h2 class="text-2xl font-bold">Dashboard</h2>
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
    <div class="bg-gray-900 rounded-xl border border-gray-800 p-4">
      <p class="text-sm text-gray-400">Total Users</p>
      <p class="text-2xl font-bold text-emerald-400">{{ total_users }}</p>
    </div>
    <div class="bg-gray-900 rounded-xl border border-gray-800 p-4">
      <p class="text-sm text-gray-400">Active Users</p>
      <p class="text-2xl font-bold text-blue-400">{{ active_users }}</p>
    </div>
    <div class="bg-gray-900 rounded-xl border border-gray-800 p-4">
      <p class="text-sm text-gray-400">By Tier</p>
      <div class="mt-2 space-y-1">
        {% for tier, count in by_tier.items() %}
          <div class="flex justify-between text-sm">
            <span class="text-gray-400 capitalize">{{ tier }}</span>
            <span class="font-mono">{{ count }}</span>
          </div>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
