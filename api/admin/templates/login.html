<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Aigenis</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">
  <div class="bg-gray-900 rounded-xl border border-gray-800 p-8 w-full max-w-sm">
    <h1 class="text-xl font-bold mb-6 text-center">Admin Login</h1>
    {% if error %}
      <div class="bg-red-900/30 border border-red-800 rounded-lg p-3 mb-4 text-sm text-red-300">{{ error }}</div>
    {% endif %}
    <form method="POST" class="space-y-4">
      <div>
        <label class="text-sm text-gray-400 block mb-1">Email</label>
        <input name="email" type="email" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm">
      </div>
      <div>
        <label class="text-sm text-gray-400 block mb-1">Password</label>
        <input name="password" type="password" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm">
      </div>
      <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-lg text-sm font-medium">Sign In</button>
    </form>
  </div>
</body>
</html>
